<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="voltar">
        <button type="button" onclick="window.location.href='index.php'"> 
            <img src="img/voltar.png" width="24" alt="Voltar">
        </button>
    </div>
    <section>
        <form  method="post" id="form_di">
            <div id="notas">
                {notas}
            </div>

            <label for="media">Media para passar:</label>
            <input type="number" id="media" name="media" value="{media}" step="0.01" min="0" max="10">
            
            <button type="submit">Calcular Média</button>

        </form>
    </section>
    <button type="button" onclick="addNota()">Adicionar nota</button>
    <button type="button" onclick="removeNota()">Remover nota</button>


<script>

const notas = document.querySelector("#notas");

function addNota() {

    const ultimoInput = notas.querySelector("input:last-of-type");
    const ultimaLabel = ultimoInput.previousElementSibling;

    const novoLabel = ultimaLabel.cloneNode(true);
    const novoInput = ultimoInput.cloneNode(true);

    const n = notas.querySelectorAll("input").length + 1;

    novoLabel.innerText = `Nota ${n}:`;
    novoInput.id = `num${n}`;
    novoInput.value = "";

    notas.appendChild(novoLabel);
    notas.appendChild(novoInput);
    notas.appendChild(document.createElement("br"));
    notas.appendChild(document.createElement("br"));
}

function removeNota() {

    if (notas.children.length > 1) {
        notas.lastElementChild.remove();
    }

}

</script>
</body>
</html>
