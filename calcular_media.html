<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button type="button" onclick="window.location.href='index.php'"> 
        <img src="img/voltar.png" width="24" alt="Voltar">
    </button>
    <form action="notas.php" method="post" id="form_di">
        <div id="notas"></div>
        <input type="hidden" name="nome" value="{nome}">
        <label for="num1">Nota 1:</label>
        <input type="number" id="num1" name="num[]" step="0.01" min="0" max="10" required><br><br>
        <label for="num2">Nota 2:</label>
        <input type="number" id="num2" name="num[]" step="0.01" min="0" max="10" required><br><br>
        <label for="num3">Nota 3:</label>
        <input type="number" id="num3" name="num[]" step="0.01" min="0" max="10" required><br><br>
        <label for="num4">Nota 4:</label>
        <input type="number" id="num4" name="num[]" step="0.01" min="0" max="10" required><br><br>

        <label for="media">Media para passar:</label>
        <input type="number" id="media" name="media" step="0.01" min="0" max="10" required><br><br>
        
        <button type="submit">Calcular Média</button>

    </form>
    <button type="button" onclick="addNota()">Adicionar nota</button>
    <button type="button" onclick="removeNota()">Remover nota</button>


<script>

const notas = document.querySelector("#notas");

function addNota() {

    const label = document.createElement("label");

    const input = document.createElement("input");
    input.type = "number";
    input.name = "num[]";
    input.step = "0.01";
    input.id = `num${notas.children.length + 1}`;
    input.min = "0";
    input.max = "10";
    input.required = true;

    label.appendChild(input);

    notas.appendChild(label);
}

function removeNota() {

    if (notas.children.length > 1) {
        notas.lastElementChild.remove();
    }

}

</script>
</body>
</html>
