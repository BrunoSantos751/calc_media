<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="voltar">
        <button type="button" class="btn-icon" onclick="window.location.href='index.php'" title="Voltar">
            <img src="img/voltar.png" width="24" alt="Voltar">
        </button>
    </div>
    
    <main class="card">
        <section>
            <h2 style="margin-bottom: 1.5rem; color: var(--text); border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem;">Aluno: {nome}</h2>
            <form method="post" id="form_di">
                <input type="hidden" name="nome" value="{nome}">
                
                <div id="notas">
                    {notas}
                </div>

                <div style="background: #f8fafc; padding: 1rem; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 1.5rem; margin-top: 1rem;">
                    <label for="media" style="font-weight: 500; color: var(--text);">Media para passar:</label>
                    <input type="number" placeholder="media padrão igual a 7" id="media" name="media" value="{media}" step="0.01" min="0" max="10" style="margin-bottom: 0;">
                </div>

                <button type="submit" style="width: 100%; padding: 0.75rem; font-size: 1rem;">Calcular Média</button>

            </form>
        </section>

        <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0;">
            <button type="button" class="btn-secondary" onclick="addNota()" style="flex: 1;">+ Adicionar nota</button>
            <button type="button" class="btn-danger" onclick="removeNota()" style="flex: 1;">- Remover nota</button>
        </div>

        {resultado}
    </main>


    <script>

        const notas = document.querySelector("#notas");
        notas.style.display = 'flex';
        notas.style.flexDirection = 'column';
        notas.style.gap = '0.75rem';
        notas.style.marginBottom = '1.5rem';

        function addNota() {
            const ultimaDiv = notas.lastElementChild;
            const novaDiv = ultimaDiv.cloneNode(true);
            
            const n = notas.children.length + 1;
            
            const novoLabel = novaDiv.querySelector("label");
            const novoInput = novaDiv.querySelector("input");
            
            novoLabel.innerText = `Nota ${n}:`;
            novoLabel.setAttribute("for", `num${n}`);
            
            novoInput.id = `num${n}`;
            novoInput.value = "";
            
            notas.appendChild(novaDiv);
        }

        function removeNota() {
            if (notas.children.length > 1) {
                notas.lastElementChild.remove();
            }
        }

    </script>
</body>

</html>
