<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div>
        <button type="button" onclick="window.location.href='index.php'"> 
            <img src="img/voltar.png" width="24" alt="Voltar">
        </button>
    </div>
    <section>
        <form  method="post" id="form_di">
            <div id="notas">
                {notas}
            </div>

            <label for="media">Media para passar:</label>
            <input type="number" id="media" name="media" value="{media}" step="0.01" min="0" max="10">
            
            <button type="submit">Calcular Média</button>

        </form>
    </section>
    <button type="button" onclick="addNota()">Adicionar nota</button>
    <button type="button" onclick="removeNota()">Remover nota</button>


<script>

const notas = document.querySelector("#notas");

function addNota() {

    const label = document.createElement("label");

    const input = document.createElement("input");
    input.type = "number";
    input.name = "num[]";
    input.step = "0.01";
    input.id = `num${notas.children.length + 1}`;
    input.min = "0";
    input.max = "10";
    input.required = true;

    label.appendChild(input);

    notas.appendChild(label);
}

function removeNota() {

    if (notas.children.length > 1) {
        notas.lastElementChild.remove();
    }

}

</script>
</body>
</html>
